  <rect x="11.5" y="10" width="2" height="8"  rx="1" fill="white" opacity="0.95"/>
  <rect x="14.5" y="11.5" width="2" height="6" rx="1" fill="white" opacity="0.95"/>
  <rect x="17.5" y="9.5" width="2" height="9" rx="1" fill="white" opacity="0.95"/>
  <rect x="20.5" y="11" width="2" height="6"  rx="1" fill="white" opacity="0.95"/>

  <defs>
    <linearGradient id="bubbleGrad" x1="6" y1="5" x2="26" y2="27" gradientUnits="userSpaceOnUse">
