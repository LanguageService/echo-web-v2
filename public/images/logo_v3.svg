<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="echoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#E11D48"/>
    </linearGradient>
  </defs>

  <!-- The E / Soundwave Icon -->
  <g transform="translate(10, 20)">
    <!-- Vertical Bar of E -->
    <rect x="0" y="0" width="14" height="80" rx="7" fill="url(#echoGradient)" />
    
    <!-- Top wave -->
    <rect x="22" y="0" width="44" height="14" rx="7" fill="url(#echoGradient)" />
    
    <!-- Middle wave (shorter) -->
    <rect x="22" y="33" width="30" height="14" rx="7" fill="url(#echoGradient)" />
    
    <!-- Bottom wave -->
    <rect x="22" y="66" width="56" height="14" rx="7" fill="url(#echoGradient)" />
    
    <!-- Echoing elements -->
    <circle cx="95" cy="40" r="7" fill="url(#echoGradient)" opacity="0.6"/>
    <circle cx="115" cy="40" r="4" fill="url(#echoGradient)" opacity="0.3"/>
  </g>

  <!-- Wordmark -->
  <text x="150" y="82" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="68" fill="currentColor" letter-spacing="-2">
    ECHO
  </text>
</svg>
